name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Ruff
        working-directory: backend
        run: |
          uv sync --frozen
          uv run ruff check .

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: ESLint
        working-directory: frontend
        run: |
          npm ci
          npx eslint .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Pytest
        working-directory: backend
        run: |
          uv sync --frozen
          uv run pytest

  docker:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Build for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: turnbeutel:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name smoke -p 8000:8000 turnbeutel:smoke
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::Container did not become healthy within 60s"
          docker logs smoke
          exit 1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # PRs only build (to catch Dockerfile breakage); pushes to main
      # and version tags also publish to ghcr.io
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
