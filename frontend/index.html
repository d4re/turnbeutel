<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Turnbeutel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <aside id="sidebar" data-sheet="half">
            <div id="sheet-handle" aria-hidden="true"><span></span></div>
            <header id="sidebar-header">
                <h1>Turnbeutel</h1>
                <div id="header-controls">
                    <div class="view-tabs" id="view-tabs">
                        <button class="view-tab active" data-view="venues">Venues</button>
                        <button class="view-tab" data-view="courses">Courses</button>
                    </div>
                    <button id="filters-button" type="button">Filters<span id="filter-badge" hidden></span></button>
                </div>
                <p id="stats"></p>
            </header>

            <div id="filters">
                <div class="filters-overlay-bar">
                    <span>Filters</span>
                    <button type="button" class="filters-done">Done</button>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Membership Type</label>
                    <div class="toggle-group" id="membership-toggle">
                        <label class="toggle-option">
                            <input type="radio" name="membership" value="corporate" checked>
                            <span>Corporate</span>
                        </label>
                        <label class="toggle-option">
                            <input type="radio" name="membership" value="private">
                            <span>Private</span>
                        </label>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Tier Range</label>
                    <div id="tier-slider">
                        <div class="slider-track-container">
                            <div class="slider-track"></div>
                            <div class="slider-fill" id="slider-fill"></div>
                            <input type="range" id="slider-min" min="0" max="3" value="0" step="1">
                            <input type="range" id="slider-max" min="0" max="3" value="3" step="1">
                        </div>
                        <div class="slider-labels" id="slider-labels"></div>
                        <div class="slider-description" id="slider-description"></div>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="district-filter">District</label>
                    <select id="district-filter">
                        <option value="">All districts</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="activity-filter">Activity</label>
                    <select id="activity-filter">
                        <option value="">All activities</option>
                    </select>
                </div>

                <div class="filter-group inline-filters">
                    <label>
                        <input type="checkbox" id="plus-filter"> PLUS only
                    </label>
                    <label>
                        <input type="checkbox" id="coords-filter"> Map only
                    </label>
                </div>

                <div class="filter-group">
                    <input type="text" id="search-filter" placeholder="Search venue name...">
                </div>
            </div>

            <div id="courses-filters" style="display:none">
                <div class="filters-overlay-bar">
                    <span>Filters</span>
                    <button type="button" class="filters-done">Done</button>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Date</label>
                    <div id="date-strip" class="date-strip"></div>
                    <div class="date-legend">
                        <span class="legend-item"><i class="legend-swatch today"></i>Today</span>
                        <span class="legend-item"><i class="legend-swatch selected"></i>Selected</span>
                        <span class="legend-item"><i class="legend-swatch inrange"></i>In range</span>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Time of Day</label>
                    <div id="time-slider">
                        <div class="slider-track-container">
                            <div class="slider-track"></div>
                            <div class="time-any-zone"></div>
                            <div class="time-divider"></div>
                            <div class="slider-fill" id="time-slider-fill"></div>
                            <input type="range" id="time-slider-min" min="0" max="33" value="0" step="1">
                            <input type="range" id="time-slider-max" min="0" max="33" value="33" step="1">
                        </div>
                        <div class="time-slider-ticks">
                            <span>Any</span><span>8</span><span>12</span><span>16</span><span>20</span><span>24</span>
                        </div>
                        <div class="slider-description" id="time-slider-description"></div>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="category-filter">Category</label>
                    <select id="category-filter">
                        <option value="">All categories</option>
                    </select>
                </div>

                <div class="filter-group inline-filters">
                    <label>
                        <input type="checkbox" id="course-spots-filter"> Has free spots
                    </label>
                    <label>
                        <input type="checkbox" id="course-plus-filter"> PLUS only
                    </label>
                    <label>
                        <input type="checkbox" id="course-online-filter"> Show online
                    </label>
                </div>

                <div class="filter-group">
                    <input type="text" id="course-search-filter" placeholder="Search course or venue...">
                </div>
            </div>

            <div id="venue-list"></div>
            <div id="course-list" style="display:none"></div>
        </aside>

        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
</body>
</html>
